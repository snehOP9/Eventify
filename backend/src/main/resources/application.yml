server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: event-platform
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            redirect-uri: "${APP_GOOGLE_OAUTH2_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}"
            scope:
              - openid
              - profile
              - email
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy-github-client-secret}
            redirect-uri: "${APP_GITHUB_OAUTH2_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}"
            scope:
              - read:user
              - user:email
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:event_platform;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: "${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}"
  oauth2:
    redirect-uri: "${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/auth/callback}"
    backend-callback-base-url: "${APP_OAUTH2_BACKEND_CALLBACK_BASE_URL:http://localhost:8080}"
    code-ttl-seconds: ${APP_OAUTH2_CODE_TTL_SECONDS:90}
  jwt:
    # Base64 for "event-platform-jwt-secret-key-change-me-2026".
    secret: ${APP_JWT_SECRET:ZXZlbnQtcGxhdGZvcm0tand0LXNlY3JldC1rZXktY2hhbmdlLW1lLTIwMjY=}
    access-token-expiration-seconds: 900
  auth:
    cookies:
      secure: ${APP_AUTH_COOKIES_SECURE:false}
      same-site: ${APP_AUTH_COOKIES_SAME_SITE:None}
    refresh-token-expiration-seconds: 1209600
    otp-expiration-seconds: 600
    otp-resend-interval-seconds: 60
    max-failed-login-attempts: 5
    lockout-duration-seconds: 900
  razorpay:
    key-id: ${APP_RAZORPAY_KEY_ID:}
    key-secret: ${APP_RAZORPAY_KEY_SECRET:}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:no-reply@eventify.local}
