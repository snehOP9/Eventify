server:
  port: ${PORT:8080}

spring:
  application:
    name: event-platform
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:event_platform}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    # Base64 for "event-platform-jwt-secret-key-change-me-2026".
    secret: ${APP_JWT_SECRET:ZXZlbnQtcGxhdGZvcm0tand0LXNlY3JldC1rZXktY2hhbmdlLW1lLTIwMjY=}
    access-token-expiration-seconds: 900
  auth:
    refresh-token-expiration-seconds: 1209600
    otp-expiration-seconds: 600
    otp-resend-interval-seconds: 60
    max-failed-login-attempts: 5
    lockout-duration-seconds: 900
